services:
  - type: web
    name: maison-bespoke-atelier-backend
    runtime: python
    plan: free
    rootDir: app
    buildCommand: python -m pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: python -m gunicorn app.wsgi:application --log-file -
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: maison-bespoke-atelier-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: WEB_CONCURRENCY
        value: 4
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

databases:
  - name: maison-bespoke-atelier-db
    plan: free
